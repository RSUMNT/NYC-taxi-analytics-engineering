version: 2

models:
  - name: dim_vendor
    description: "Lookup table for taxi vendors with surrogate keys"
    columns:
      - name: vendor_key
        description: "Surrogate key generated by row_number()"
        tests:
          - unique
          - not_null
      - name: vendor_id
        description: "Natural key from source system (VendorID)"
        tests:
          - unique
          - not_null
      - name: vendor_name
        description: "Human-readable vendor name"
        tests:
          - not_null

  - name: dim_rate_code
    description: "Lookup table for rate codes (Standard, JFK, Newark, etc.)"
    columns:
      - name: rate_code_key
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: rate_code_id
        description: "Natural key from RatecodeID"
        tests:
          - unique
          - not_null

  - name: dim_payment_type
    description: "Lookup table for payment types (Credit card, Cash, etc.)"
    columns:
      - name: payment_type_key
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: payment_type_id
        description: "Natural key from payment_type"
        tests:
          - unique
          - not_null

  - name: dim_store_and_fwd
    description: "Lookup table for store-and-forward flag"
    columns:
      - name: store_and_fwd_key
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: store_and_fwd_id
        description: "Natural key (Y/N)"
        tests:
          - unique
          - not_null
